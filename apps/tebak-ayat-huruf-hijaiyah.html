<script>

const hurufHijaiyah = [
"ا","ب","ت","ث","ج","ح","خ",
"د","ذ","ر","ز","س","ش",
"ص","ض","ط","ظ","ع","غ",
"ف","ق","ك","ل","م","ن","و","ه","لا","ء","ي"
];

// daftar file audio
const daftarMusik = [
"../sound/press.mp3",
"../sound/correct.mp3",
"../sound/sound01.mp3",
"../sound/sound02.mp3",
"../sound/sound03.mp3",
"../sound/sound04.mp3",
"../sound/sound05.mp3",
"../sound/sound06.mp3",
"../sound/sound07.mp3",
"../sound/sound08.mp3",
"../sound/sound09.mp3",
"../sound/sound10.mp3",
"../sound/sound11.mp3"
];

const suf = document.getElementById("suffle");
const btn = document.getElementById("click");
const musik = document.getElementById("musik");

btn.addEventListener("click", function(){

  suf.classList.add("spin");

  let interval = setInterval(function(){

    let random = Math.floor(Math.random()*hurufHijaiyah.length);
    suf.textContent = hurufHijaiyah[random];

  },80);

  setTimeout(function(){

    clearInterval(interval);
    suf.classList.remove("spin");

    let finalRandom = Math.floor(Math.random()*hurufHijaiyah.length);
    suf.textContent = hurufHijaiyah[finalRandom];

    // pilih musik secara acak
    let randomMusik = Math.floor(Math.random()*daftarMusik.length);
    musik.src = daftarMusik[randomMusik];

    musik.currentTime = 0;
    musik.play();

  },3000);

});

</script>

</body>
