<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Irmawati</title>
  <style>
    body {
      justify-content: center;
      background: linear-gradient(122deg,#000,#005,#060,#611,#000);
    background-size: 500% 500%;

  animation: gradientMove 10s ease infinite;
}

@keyframes gradientMove{
  0%{
    background-position: 0% 50%;
  }
  50%{
    background-position: 100% 50%;
  }
  100%{
    background-position: 0% 50%;
  }
}
    img {
      display: block;
      margin-left: auto;
      margin-right: auto;
      height: 90%;
      width: 95%;
      justify-content: center;
      justify: center;
    }

#snow-container{
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  pointer-events:none;
  overflow:hidden;
  z-index:9999;
}

.snowflake {
  position: fixed;
  top: -100px;
  font-size: 5em;
  opacity: 0.7;
  animation: fall linear infinite;
  pointer-events: none;
  }

@keyframes fall {
  0% {
    transform: translateY(-100px) translateX(-100px) rotate(0deg);
    }
    100% {
      transform: translateY(110vh) translateX(50px) rotate(970deg);
      }
  }
  </style>
</head>
<body>
<br>
<br>
<br>
<div id="snow-container"></div>
<img src="../img/cetak.png" alt="Irmawati">



 <audio autoplay loop muted id="bg-music">
  <source src="https://github.com/thekingearth/myaudiomusic/raw/refs/heads/main/Somewhere%20only%20we%20know.mp3" type="audio/mpeg">
</audio>

<script>
document.addEventListener("click", function(){
  const music = document.getElementById("bg-music");
  music.muted = false;
  music.play();
});
</script>
<script>
document.addEventListener("DOMContentLoaded", function(){

const snowContainer = document.getElementById('snow-container');

const flowers = ['🌸','🍥','🌼','🏵','💮'];

function createSnowflake(){

  const snowflake = document.createElement('div');

  snowflake.classList.add('snowflake');

  snowflake.textContent =
  flowers[Math.floor(Math.random()*flowers.length)];

  snowflake.style.left =
  Math.random()*window.innerWidth + 'px';

  snowflake.style.animationDuration =
  Math.random()*5 + 4 + 's';

  snowflake.style.fontSize =
  Math.random()*30 + 15 + 'px';

  snowContainer.appendChild(snowflake);

  setTimeout(()=>{
    snowflake.remove();
  },15000);

}

setInterval(createSnowflake,200);

});
</script>
</body>
</html>
