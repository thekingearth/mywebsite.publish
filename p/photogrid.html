<!DOCTYPE html> <html> <head> <meta charset="UTF-8"> <title>Grid Foto Editor</title> <style> body{ font-family:Arial; background:#111; color:white; text-align:center; padding:20px; } input,select,button{ margin:10px; padding:10px; border-radius:6px; border:none; } canvas{ margin-top:20px; border:2px solid #444; max-width:100%; } </style> </head> <body> <h2>Grid Foto Editor</h2> <input type="file" id="upload" accept="image/*"> <br> <select id="ratio"> <option value="1">Persegi (1:1)</option> <option value="1.414">A4 (1:1.414)</option> <option value="1.3">F4 (1:1.3)</option> </select> <select id="grid"> <option value="2">2 x 2</option> <option value="3">3 x 3</option> <option value="4">4 x 4</option> </select> <select id="quality"> <option value="1">HD</option> <option value="0.7">Medium</option> <option value="0.4">Low</option> </select> <br> <button onclick="generate()">Generate Grid</button> <button onclick="download()">Download</button> <br> <canvas id="canvas"></canvas> <script> let img = new Image() let canvas = document.getElementById("canvas") let ctx = canvas.getContext("2d") document.getElementById("upload").addEventListener("change", function(e){ let file = e.target.files[0] let reader = new FileReader() reader.onload = function(event){ img.src = event.target.result } reader.readAsDataURL(file) }) function generate(){ let ratio = parseFloat(document.getElementById("ratio").value) let grid = parseInt(document.getElementById("grid").value) // ukuran dasar let width = 800 let height = width * ratio canvas.width = width canvas.height = height let cellW = width / grid let cellH = height / grid for(let i=0;i<grid;i++){ for(let j=0;j<grid;j++){ ctx.drawImage( img, 0,0,img.width,img.height, i*cellW, j*cellH, cellW, cellH ) } } } function download(){ let quality = parseFloat(document.getElementById("quality").value) let link = document.createElement("a") link.download = "grid-foto.jpg" link.href = canvas.toDataURL("image/jpeg",quality) link.click() } </script> </body> </html>
